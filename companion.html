<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Собеседник</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a12;color:#e0e0f0;
  font-family:system-ui,sans-serif;
  height:100dvh;display:flex;flex-direction:column;overflow:hidden;
}

/* ── Top status bar ── */
#topbar{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 14px;font-size:11px;color:#555;
  border-bottom:1px solid #16162a;flex-shrink:0;
}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#222;margin-right:4px;transition:background 0.3s}
.dot.ok{background:#4ade80}
.dot.warn{background:#f59e0b;animation:blink 1s infinite}
#back-btn{color:#555;text-decoration:none;font-size:13px;padding:4px 8px}

/* ── Chat area ── */
#chat{
  flex:1;overflow-y:auto;padding:16px;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;
}
.msg{
  max-width:82%;padding:10px 14px;
  border-radius:18px;font-size:15px;line-height:1.55;
  animation:fadeUp 0.25s ease;
}
.msg.user{
  align-self:flex-end;background:#2a2a52;color:#cfd0ff;
  border-bottom-right-radius:4px;
}
.msg.bot{
  align-self:flex-start;background:#161626;color:#e0e0f0;
  border-bottom-left-radius:4px;border:1px solid #1e1e3a;
}
.msg.thinking{
  align-self:flex-start;background:#161626;
  color:#444;font-style:italic;border:1px solid #1e1e3a;
  border-bottom-left-radius:4px;
}

/* ── Controls area ── */
#controls{
  flex-shrink:0;padding:14px 16px;
  background:#0d0d1a;border-top:1px solid #16162a;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}

/* ── Mic button ── */
#mic-wrap{position:relative;display:flex;align-items:center;justify-content:center}
#mic-btn{
  width:68px;height:68px;border-radius:50%;border:none;
  background:#1e1e3a;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,transform 0.15s;
  position:relative;z-index:1;
}
#mic-btn:active{transform:scale(0.93)}
#mic-btn.listening{background:#92400e}
#mic-btn svg{width:28px;height:28px;pointer-events:none}
/* ripple ring when listening */
#mic-ring{
  position:absolute;width:68px;height:68px;border-radius:50%;
  border:2px solid #f59e0b;opacity:0;
  animation:none;pointer-events:none;
}
#mic-ring.active{animation:ripple 1.2s ease-out infinite}
#mic-label{font-size:12px;color:#444;margin-top:4px;text-align:center}

/* ── Text input row ── */
#text-row{display:flex;width:100%;gap:8px;max-width:500px}
#text-inp{
  flex:1;background:#161626;border:1px solid #2a2a52;
  border-radius:22px;padding:10px 16px;
  color:#e0e0f0;font-size:14px;outline:none;
}
#text-inp:focus{border-color:#5d5dae}
#send-btn{
  background:#2a2a52;border:none;border-radius:50%;
  width:44px;height:44px;cursor:pointer;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
#send-btn svg{width:18px;height:18px;fill:#c8c8ff}

/* ── Voice row ── */
#voice-row{
  display:flex;align-items:center;gap:12px;
  font-size:12px;color:#444;
}
#voice-row label{display:flex;align-items:center;gap:5px;cursor:pointer}
#tts-chk{width:14px;height:14px;cursor:pointer;accent-color:#5d5dae}
#voice-sel{
  background:#161626;color:#888;
  border:1px solid #2a2a52;border-radius:6px;
  padding:3px 6px;font-size:11px;max-width:140px;
}

@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
@keyframes ripple{0%{transform:scale(1);opacity:0.7}100%{transform:scale(2);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div id="topbar">
  <a href="/" id="back-btn">&#8592; меню</a>
  <span><span class="dot" id="ws-dot"></span><span id="ws-lbl">сервер</span></span>
  <span><span class="dot" id="wl-dot"></span><span id="wl-lbl">экран</span></span>
  <span><span class="dot" id="esp-dot"></span><span id="esp-lbl">ESP</span></span>
</div>

<div id="chat">
  <div class="msg bot">Привет! Нажми на микрофон и говори. Я отвечу голосом.</div>
</div>

<div id="controls">
  <div id="mic-wrap">
    <div id="mic-ring"></div>
    <button id="mic-btn" title="Нажми — говори — нажми снова для остановки">
      <!-- Microphone SVG -->
      <svg viewBox="0 0 24 24" fill="none" stroke="#c8c8ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="9" y="1" width="6" height="11" rx="3"/>
        <path d="M5 10a7 7 0 0014 0"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>
  </div>
  <div id="mic-label">нажми для записи</div>

  <div id="text-row">
    <input id="text-inp" type="text" placeholder="или введи текст..." autocomplete="off" autocorrect="off">
    <button id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M22 2L11 13M22 2L15 22l-4-9-9-4z"/></svg>
    </button>
  </div>

  <div id="voice-row">
    <label><input type="checkbox" id="tts-chk" checked> Говорить ответы</label>
    <select id="voice-sel"><option value="">авто голос</option></select>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// Wake Lock — экран не засыпает
// ═══════════════════════════════════════════════════════
let wakeLock = null;
async function keepAwake() {
  try {
    wakeLock = await navigator.wakeLock.request('screen');
    setDot('wl-dot', 'ok'); setText('wl-lbl', 'экран ОК');
    wakeLock.addEventListener('release', keepAwake);
  } catch {
    setText('wl-lbl', 'wake lock нет');
  }
}
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') keepAwake();
});
keepAwake();

// ═══════════════════════════════════════════════════════
// WebSocket к серверу
// ═══════════════════════════════════════════════════════
let ws;
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/browser`);
  ws.onopen  = () => { setDot('ws-dot','ok');  setText('ws-lbl','сервер ОК'); };
  ws.onclose = () => { setDot('ws-dot','');    setText('ws-lbl','нет связи'); setTimeout(connectWS,3000); };
  ws.onerror = () => {};
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.type === 'esp_online') {
      setDot('esp-dot','ok');
      setText('esp-lbl', d.id + ' [' + (d.caps||[]).join(',') + ']');
    } else if (d.type === 'esp_offline') {
      setDot('esp-dot',''); setText('esp-lbl','ESP нет');
    }
  };
}
connectWS();

// ═══════════════════════════════════════════════════════
// TTS — голосовой вывод
// (при подключённой BT-колонке звук идёт через неё автоматически)
// ═══════════════════════════════════════════════════════
const ttsChk  = document.getElementById('tts-chk');
const voiceSel = document.getElementById('voice-sel');
let voices = [];

function loadVoices() {
  voices = speechSynthesis.getVoices();
  const ruVoices = voices.filter(v => v.lang.startsWith('ru'));
  const enVoices = voices.filter(v => v.lang.startsWith('en'));
  const list = [...ruVoices, ...enVoices];
  if (!list.length) return;
  voiceSel.innerHTML = '<option value="">авто</option>' +
    list.map((v,i) => `<option value="${voices.indexOf(v)}">${v.name.slice(0,22)}</option>`).join('');
}
speechSynthesis.addEventListener('voiceschanged', loadVoices);
loadVoices();

function speak(text) {
  if (!ttsChk.checked || !text) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  const idx = parseInt(voiceSel.value);
  if (!isNaN(idx) && voices[idx]) {
    u.voice = voices[idx];
  } else {
    // Автовыбор: предпочесть русский
    const ru = voices.find(v => v.lang.startsWith('ru'));
    if (ru) u.voice = ru;
  }
  u.rate = 1.0; u.pitch = 1.0; u.volume = 1.0;
  speechSynthesis.speak(u);
}

// ═══════════════════════════════════════════════════════
// Chat UI
// ═══════════════════════════════════════════════════════
const chat = document.getElementById('chat');
let history = [];   // {role, content}[]

function addMsg(text, role) {
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}

// ═══════════════════════════════════════════════════════
// AI запрос (через /api/ai — ключ на сервере, не в браузере)
// ═══════════════════════════════════════════════════════
let aiPending = false;
async function askAI(userText) {
  if (aiPending) return;
  aiPending = true;
  history.push({ role: 'user', content: userText });
  const thinking = addMsg('...', 'thinking');
  try {
    const r = await fetch('/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        system: 'Ты дружелюбный робот-собеседник по имени Пит. ' +
                'Отвечай на языке пользователя. ' +
                'Будь кратким (2-3 предложения). ' +
                'Если просят физически что-то сделать — скажи что у тебя пока нет рук, но ты учится.',
        messages: history.slice(-12)
      })
    });
    const data = await r.json();
    const reply = data.reply || '(нет ответа)';
    thinking.remove();
    addMsg(reply, 'bot');
    history.push({ role: 'assistant', content: reply });
    speak(reply);
  } catch (err) {
    thinking.textContent = 'Ошибка: ' + err.message;
  } finally {
    aiPending = false;
  }
}

// ═══════════════════════════════════════════════════════
// Speech Recognition (STT)
// Работает только в Chrome/Android + HTTPS или localhost
// ═══════════════════════════════════════════════════════
const micBtn   = document.getElementById('mic-btn');
const micRing  = document.getElementById('mic-ring');
const micLabel = document.getElementById('mic-label');

const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;

if (SpeechRec) {
  recognition = new SpeechRec();
  recognition.lang = 'ru-RU';
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    isListening = true;
    micBtn.classList.add('listening');
    micRing.classList.add('active');
    micLabel.textContent = 'слушаю...';
    speechSynthesis.cancel();
  };
  recognition.onend = () => {
    isListening = false;
    micBtn.classList.remove('listening');
    micRing.classList.remove('active');
    micLabel.textContent = 'нажми для записи';
  };
  recognition.onresult = e => {
    const text = e.results[0][0].transcript.trim();
    if (text) {
      addMsg(text, 'user');
      askAI(text);
    }
  };
  recognition.onerror = e => {
    micLabel.textContent = 'ошибка: ' + e.error;
    isListening = false;
    micBtn.classList.remove('listening');
    micRing.classList.remove('active');
  };
} else {
  micBtn.title = 'Speech Recognition не поддерживается — используй текстовый ввод';
  micLabel.textContent = 'Используй текстовый ввод';
  micBtn.style.opacity = '0.4';
}

micBtn.addEventListener('click', () => {
  if (!recognition) { document.getElementById('text-inp').focus(); return; }
  if (isListening) {
    recognition.stop();
  } else {
    try { recognition.start(); } catch(e) { micLabel.textContent = e.message; }
  }
});

// ═══════════════════════════════════════════════════════
// Text input (fallback / дополнение)
// ═══════════════════════════════════════════════════════
function sendText() {
  const t = document.getElementById('text-inp').value.trim();
  if (!t) return;
  addMsg(t, 'user');
  document.getElementById('text-inp').value = '';
  askAI(t);
}
document.getElementById('send-btn').addEventListener('click', sendText);
document.getElementById('text-inp').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
});

// ═══════════════════════════════════════════════════════
// Helpers
// ═══════════════════════════════════════════════════════
function setDot(id, cls) {
  const el = document.getElementById(id);
  el.className = 'dot' + (cls ? ' ' + cls : '');
}
function setText(id, t) {
  document.getElementById(id).textContent = t;
}
</script>
</body>
</html>
