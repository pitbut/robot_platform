<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;color:#e0e0f0;font-family:system-ui,sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;padding:24px}
h1{font-size:22px;font-weight:400;color:#888;letter-spacing:2px;text-transform:uppercase}
.cards{display:flex;flex-direction:column;gap:16px;width:100%;max-width:360px}
.card{display:flex;align-items:center;gap:16px;padding:20px 24px;background:#12121e;border:1px solid #2d2d5e;border-radius:16px;text-decoration:none;color:inherit}
.card-icon{font-size:32px;width:48px;text-align:center}
.card-text h2{font-size:18px;font-weight:500;margin-bottom:4px}
.card-text p{font-size:13px;color:#666;line-height:1.4}
</style>
</head>
<body>
<h1>Robot Platform</h1>
<div class="cards">
  <a href="/companion" class="card">
    <div class="card-icon">🗣</div>
    <div class="card-text"><h2>Собеседник</h2><p>Голосовой AI-ассистент</p></div>
  </a>
  <a href="/delivery" class="card">
    <div class="card-icon">🤖</div>
    <div class="card-text"><h2>Доставщик</h2><p>Управление по карте</p></div>
  </a>
</div>
</body>
</html>
