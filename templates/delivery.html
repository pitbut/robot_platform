<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Доставщик</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;color:#e0e0f0;font-family:system-ui,sans-serif;height:100dvh;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;gap:5px;align-items:center;padding:7px 10px;background:rgba(6,6,16,0.97);z-index:600;flex-shrink:0;border-bottom:1px solid #16162a;flex-wrap:wrap}
.badge{padding:3px 9px;border-radius:10px;font-size:11px;white-space:nowrap}
.badge.ok{background:#0d2d16;color:#4ade80;border:1px solid #1a5e2e}
.badge.err{background:#2d0d0d;color:#f87171;border:1px solid #5e1a1a}
.badge.warn{background:#2d1f0d;color:#f59e0b;border:1px solid #5e3e1a}
#back-btn{color:#444;text-decoration:none;font-size:13px;margin-right:4px}
#map{flex:1;z-index:1}
.leaflet-container{background:#0d0d1a}
.ov{position:absolute;z-index:400;background:rgba(8,8,20,0.93);border:1px solid #1e1e3a;border-radius:12px;backdrop-filter:blur(4px)}

/* Sonar */
#sonar-panel{top:58px;left:8px;padding:10px 12px;min-width:118px}
#sonar-panel h4{font-size:10px;color:#444;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
.s-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;font-size:11px}
.s-lbl{color:#555;width:24px;flex-shrink:0}
.s-bg{flex:1;height:5px;background:#1a1a2e;border-radius:3px;overflow:hidden}
.s-bar{height:5px;border-radius:3px;width:100%;transition:width 0.18s,background 0.18s}
.s-val{color:#aaa;width:30px;text-align:right;font-size:11px}

/* GPS info */
#gps-panel{top:58px;right:8px;padding:10px 12px;min-width:138px;font-size:11px}
#gps-panel h4{font-size:10px;color:#444;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
.g-row{display:flex;justify-content:space-between;gap:8px;margin-bottom:4px}
.g-row span:first-child{color:#444}
#gps-src{font-size:10px;margin-top:6px;padding:3px 6px;border-radius:6px;text-align:center;background:#1a1a2e;color:#444}
#gps-src.ok{background:#0d2d16;color:#4ade80}

/* ═══ WAYPOINT PANEL ═══ */
#wp-panel{
  bottom:130px;left:8px;padding:10px 12px;width:220px;
  max-height:280px;display:flex;flex-direction:column;gap:8px;
}
#wp-panel h4{font-size:10px;color:#444;letter-spacing:1px;text-transform:uppercase}
#wp-list{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;max-height:160px}
.wp-item{
  display:flex;align-items:center;gap:6px;
  padding:5px 8px;border-radius:8px;
  background:#0e0e22;border:1px solid #1e1e3a;
  font-size:12px;
}
.wp-item.active{border-color:#4ade80;background:#0a1f12}
.wp-item.done{opacity:0.4}
.wp-num{color:#444;width:16px;flex-shrink:0;font-size:11px}
.wp-coords{flex:1;color:#aaa;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.wp-del{background:none;border:none;color:#f87171;cursor:pointer;font-size:14px;padding:0 2px;flex-shrink:0}
.wp-del:hover{color:#ff4444}

/* Nav controls */
#nav-controls{display:flex;gap:6px}
#nav-start{flex:1;padding:7px;border-radius:8px;border:none;background:#0d2d16;color:#4ade80;cursor:pointer;font-size:12px;border:1px solid #1a5e2e}
#nav-start:disabled{opacity:0.4;cursor:not-allowed}
#nav-stop{padding:7px 10px;border-radius:8px;border:none;background:#2d0d0d;color:#f87171;cursor:pointer;font-size:12px;border:1px solid #5e1a1a}
#nav-stop:disabled{opacity:0.4;cursor:not-allowed}
#nav-base{width:100%;padding:7px;border-radius:8px;border:none;background:#1a1a2e;color:#c8c8ff;cursor:pointer;font-size:12px;border:1px solid #2a2a52}
#nav-clear{width:100%;padding:5px;border-radius:8px;border:none;background:transparent;color:#444;cursor:pointer;font-size:11px;border:1px solid #1e1e3a}
#nav-status{font-size:11px;color:#444;text-align:center;min-height:16px}
#nav-status.ok{color:#4ade80}
#nav-status.warn{color:#f59e0b}
#nav-status.err{color:#f87171}

/* Speed */
#speed-panel{bottom:68px;left:8px;padding:8px 12px;width:120px}
#speed-panel label{font-size:11px;color:#444;display:block;margin-bottom:4px}
#spd-slider{width:100%;accent-color:#4ade80}
#spd-val{font-size:12px;color:#4ade80;text-align:center;margin-top:2px}

/* ═══ CAMERA ═══ */
#cam-btn{bottom:130px;right:8px;padding:7px 12px;font-size:12px;cursor:pointer;color:#888;border-radius:10px}
#cam-btn.active{color:#60a5fa;border-color:#1e3a5e;background:rgba(6,18,36,0.95)}
#cam-panel{
  bottom:165px;right:8px;width:240px;
  padding:0;overflow:hidden;border-radius:12px;
  display:none;
}
#cam-panel.open{display:block}
#cam-img{width:100%;display:block;border-radius:12px;background:#050510}
#cam-offline{padding:20px;text-align:center;font-size:12px;color:#444}

/* D-pad */
#dpad{bottom:12px;right:8px;padding:8px}
.dpad-grid{display:grid;grid-template-columns:repeat(3,50px);grid-template-rows:repeat(3,50px);gap:4px}
.db{background:#0e0e22;border:1px solid #2a2a52;border-radius:9px;color:#c8c8ff;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent;transition:background 0.08s;touch-action:none}
.db:active,.db.on{background:#3a3a72}
.db.stop{background:#1a0e0e;border-color:#522a2a;font-size:12px;color:#f87171}
.db.stop:active,.db.stop.on{background:#4a1a1a}
.db.empty{background:transparent;border-color:transparent;pointer-events:none}

/* Follow & mode */
#follow-btn{position:absolute;bottom:130px;left:50%;transform:translateX(-50%);z-index:400;background:rgba(8,8,20,0.92);border:1px solid #1e1e3a;border-radius:10px;padding:6px 12px;font-size:12px;cursor:pointer;color:#888}
#follow-btn.active{color:#4ade80;border-color:#2d5e3d}

/* Settings */
#cfg-btn{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);z-index:400;background:rgba(8,8,20,0.92);border:1px solid #1e1e3a;border-radius:10px;padding:5px 12px;font-size:11px;cursor:pointer;color:#666}
#cfg-panel{bottom:120px;left:50%;transform:translateX(-50%);padding:12px 14px;min-width:250px;display:none}
#cfg-panel.open{display:block}
#cfg-panel h4{font-size:10px;color:#444;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;text-align:center}
.cfg-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.cfg-row label{color:#666;width:90px;flex-shrink:0}
.cfg-row input[type=range]{flex:1;accent-color:#f59e0b}
.cfg-v{color:#f59e0b;width:34px;text-align:right;font-size:12px}
#cfg-send{width:100%;padding:7px;background:#1e1e3a;border:1px solid #2a2a52;border-radius:8px;color:#c8c8ff;cursor:pointer;font-size:12px;margin-top:2px}
#cfg-ack{font-size:11px;text-align:center;margin-top:5px;color:#444;min-height:14px}
#cfg-ack.ok{color:#4ade80}

/* Route line color when navigating */
.route-active { stroke: #f59e0b !important; }
</style>
</head>
<body>

<div id="topbar">
  <a href="/" id="back-btn">&#8592;</a>
  <span id="b-conn" class="badge err">нет связи</span>
  <span id="b-esp"  class="badge err">ESP: нет</span>
  <span id="b-gps"  class="badge err">GPS: нет</span>
  <span id="b-mode" class="badge warn">РУЧНОЙ</span>
  <span id="b-nav"  class="badge" style="display:none"></span>
  <span id="b-obs"  class="badge" style="display:none"></span>
</div>

<div id="map"></div>

<!-- Sonar -->
<div class="ov" id="sonar-panel">
  <h4>Сонар (см)</h4>
  <div class="s-row"><span class="s-lbl">Пер</span><div class="s-bg"><div class="s-bar" id="bf"></div></div><span class="s-val" id="vf">—</span></div>
  <div class="s-row"><span class="s-lbl">Лев</span><div class="s-bg"><div class="s-bar" id="bl"></div></div><span class="s-val" id="vl">—</span></div>
  <div class="s-row"><span class="s-lbl">Пра</span><div class="s-bg"><div class="s-bar" id="br"></div></div><span class="s-val" id="vr">—</span></div>
  <div class="s-row"><span class="s-lbl">Зад</span><div class="s-bg"><div class="s-bar" id="bb"></div></div><span class="s-val" id="vb">—</span></div>
</div>

<!-- GPS -->
<div class="ov" id="gps-panel">
  <h4>GPS телефона</h4>
  <div class="g-row"><span>Лат</span><span id="g-lat">—</span></div>
  <div class="g-row"><span>Лнг</span><span id="g-lng">—</span></div>
  <div class="g-row"><span>Точн</span><span id="g-acc">—</span></div>
  <div id="gps-src">нет сигнала</div>
</div>

<!-- ═══ WAYPOINT PANEL ═══ -->
<div class="ov" id="wp-panel">
  <h4>&#9873; Маршрут (нажми на карту)</h4>
  <div id="wp-list"><div style="font-size:11px;color:#333;text-align:center;padding:8px">Нажми на карту чтобы<br>добавить точку</div></div>
  <div id="nav-controls">
    <button id="nav-start" disabled>&#9654; Старт</button>
    <button id="nav-stop"  disabled>&#9632; Стоп</button>
  </div>
  <button id="nav-base" disabled>&#8962; На базу</button>
  <button id="nav-clear">✕ Очистить маршрут</button>
  <div id="nav-status">Добавь точки и нажми Старт</div>
</div>

<!-- Speed -->
<div class="ov" id="speed-panel">
  <label>Скорость</label>
  <input type="range" id="spd-slider" min="60" max="255" value="150">
  <div id="spd-val">150</div>
</div>

<!-- Camera button -->
<button class="ov" id="cam-btn">&#128247; Камера</button>

<!-- Camera panel -->
<div class="ov" id="cam-panel">
  <img id="cam-img" src="" alt="">
  <div id="cam-offline">Камера не подключена.<br><small>Открой <b>/robot-cam</b> на телефоне робота</small></div>
</div>

<!-- Follow -->
<button id="follow-btn" class="active">&#x2316; Слежение</button>

<!-- Settings -->
<button id="cfg-btn">&#9881; Пороги</button>
<div class="ov" id="cfg-panel">
  <h4>Пороги остановки</h4>
  <div class="cfg-row"><label>Спереди (см)</label><input type="range" id="cfg-f" min="10" max="150" value="50" oninput="document.getElementById('cfg-fv').textContent=this.value"><span class="cfg-v" id="cfg-fv">50</span></div>
  <div class="cfg-row"><label>По бокам (см)</label><input type="range" id="cfg-s" min="5" max="100" value="30" oninput="document.getElementById('cfg-sv').textContent=this.value"><span class="cfg-v" id="cfg-sv">30</span></div>
  <div class="cfg-row"><label>Сзади (см)</label><input type="range" id="cfg-r" min="5" max="100" value="25" oninput="document.getElementById('cfg-rv').textContent=this.value"><span class="cfg-v" id="cfg-rv">25</span></div>
  <button id="cfg-send">&#10003; Отправить на ESP</button>
  <div id="cfg-ack"></div>
</div>

<!-- D-pad -->
<div class="ov" id="dpad">
  <div class="dpad-grid">
    <div class="db empty"></div>
    <button class="db" data-cmd="forward">&#8593;</button>
    <div class="db empty"></div>
    <button class="db" data-cmd="left">&#8592;</button>
    <button class="db stop" data-cmd="stop">&#9632;</button>
    <button class="db" data-cmd="right">&#8594;</button>
    <div class="db empty"></div>
    <button class="db" data-cmd="backward">&#8595;</button>
    <div class="db empty"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ═══════════════════════════════════════════════════════
// КАРТА
// ═══════════════════════════════════════════════════════
const map = L.map('map', { zoomControl: true, attributionControl: false })
             .setView([41.2995, 69.2401], 16);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 20, opacity: 0.85 }).addTo(map);

const robotIcon = L.divIcon({
  className: '',
  html: '<div style="width:18px;height:18px;background:#60a5fa;border:2.5px solid #0a0a12;border-radius:50%;box-shadow:0 0 10px #60a5fa,0 0 20px rgba(96,165,250,0.4)"></div>',
  iconSize:[18,18], iconAnchor:[9,9]
});

let robotMarker = null, trailPts = [], trailLine = null, mapFollow = true;

function updateRobotPos(lat, lng) {
  if (!robotMarker) robotMarker = L.marker([lat,lng],{icon:robotIcon,zIndexOffset:1000}).addTo(map);
  else robotMarker.setLatLng([lat,lng]);
  trailPts.push([lat,lng]);
  if (trailPts.length > 500) trailPts.shift();
  if (trailLine) map.removeLayer(trailLine);
  trailLine = L.polyline(trailPts, {color:'#60a5fa',weight:2,opacity:0.4}).addTo(map);
  if (mapFollow) map.setView([lat,lng], map.getZoom(), {animate:true});
}

map.on('dragstart', () => { mapFollow=false; document.getElementById('follow-btn').classList.remove('active'); });
document.getElementById('follow-btn').addEventListener('click', () => {
  mapFollow = !mapFollow;
  document.getElementById('follow-btn').classList.toggle('active', mapFollow);
});

// ═══════════════════════════════════════════════════════
// WAYPOINTS — система маршрутных точек
// ═══════════════════════════════════════════════════════
let waypoints   = [];  // [{lat,lng,marker,routeMarker}]
let basePos     = null;// {lat,lng} — база (первое положение)
let navActive   = false;
let currentWP   = 0;
let routeLine   = null;

function renderWPList() {
  const list = document.getElementById('wp-list');
  if (!waypoints.length) {
    list.innerHTML = '<div style="font-size:11px;color:#333;text-align:center;padding:8px">Нажми на карту чтобы<br>добавить точку</div>';
    document.getElementById('nav-start').disabled = true;
    document.getElementById('nav-base').disabled  = true;
    return;
  }
  list.innerHTML = waypoints.map((wp,i) => `
    <div class="wp-item ${navActive && i===currentWP ? 'active' : ''} ${navActive && i<currentWP ? 'done' : ''}" id="wpi-${i}">
      <span class="wp-num">${i+1}</span>
      <span class="wp-coords">${wp.lat.toFixed(4)}, ${wp.lng.toFixed(4)}</span>
      <button class="wp-del" onclick="deleteWP(${i})" ${navActive?'disabled':''}>✕</button>
    </div>`).join('');
  document.getElementById('nav-start').disabled = navActive || waypoints.length === 0;
  document.getElementById('nav-base').disabled  = waypoints.length === 0;
  drawRoute();
}

function drawRoute() {
  if (routeLine) map.removeLayer(routeLine);
  if (waypoints.length < 1) return;
  const pts = waypoints.map(wp => [wp.lat, wp.lng]);
  if (robotMarker) pts.unshift(robotMarker.getLatLng());
  routeLine = L.polyline(pts, {
    color: navActive ? '#f59e0b' : '#444',
    weight: 2, dashArray: navActive ? null : '6 4', opacity: 0.7
  }).addTo(map);
}

function addWaypoint(lat, lng) {
  if (navActive) return;
  const num = waypoints.length + 1;
  const marker = L.marker([lat,lng], {
    icon: L.divIcon({
      className:'',
      html:`<div style="width:22px;height:22px;background:#f59e0b;border:2px solid #0a0a12;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;color:#0a0a12">${num}</div>`,
      iconSize:[22,22], iconAnchor:[11,11]
    }),
    draggable: true
  }).addTo(map);

  marker.on('dragend', e => {
    const idx = waypoints.findIndex(w => w.marker === marker);
    if (idx >= 0) {
      waypoints[idx].lat = e.target.getLatLng().lat;
      waypoints[idx].lng = e.target.getLatLng().lng;
      renderWPList();
    }
  });

  waypoints.push({ lat, lng, marker });
  renderWPList();
}

function deleteWP(idx) {
  if (navActive) return;
  map.removeLayer(waypoints[idx].marker);
  waypoints.splice(idx, 1);
  // Перенумеровать маркеры
  waypoints.forEach((wp, i) => {
    wp.marker.setIcon(L.divIcon({
      className:'',
      html:`<div style="width:22px;height:22px;background:#f59e0b;border:2px solid #0a0a12;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:bold;color:#0a0a12">${i+1}</div>`,
      iconSize:[22,22], iconAnchor:[11,11]
    }));
  });
  renderWPList();
}

// Нажатие на карту = добавить точку (только в ручном режиме)
map.on('click', e => {
  if (!navActive) addWaypoint(e.latlng.lat, e.latlng.lng);
});

// СТАРТ маршрута
document.getElementById('nav-start').addEventListener('click', () => {
  if (!espId || !ws || ws.readyState !== 1) {
    setNavStatus('ESP не подключён!', 'err'); return;
  }
  if (!waypoints.length) {
    setNavStatus('Добавь точки на карту', 'warn'); return;
  }
  navActive  = true;
  currentWP  = 0;
  setBadge('b-mode', 'АВТО', 'ok');
  document.getElementById('nav-start').disabled = true;
  document.getElementById('nav-stop').disabled  = false;
  setNavStatus('Маршрут запущен → точка 1', 'ok');

  // Отправить весь маршрут ESP
  ws.send(JSON.stringify({
    target: espId,
    type:   'waypoints',
    points: waypoints.map(w => ({lat: w.lat, lng: w.lng}))
  }));
  renderWPList();
});

// СТОП маршрута
document.getElementById('nav-stop').addEventListener('click', stopNav);

function stopNav(reason) {
  if (!navActive) return;
  navActive = false;
  document.getElementById('nav-start').disabled = false;
  document.getElementById('nav-stop').disabled  = true;
  setBadge('b-mode', 'РУЧНОЙ', 'warn');
  if (ws && ws.readyState===1 && espId) {
    ws.send(JSON.stringify({target:espId, type:'cmd', cmd:'stop', speed:0}));
    ws.send(JSON.stringify({target:espId, type:'nav_cancel'}));
  }
  setNavStatus(reason || 'Маршрут остановлен', 'warn');
  renderWPList();
  drawRoute();
}

// НА БАЗУ
document.getElementById('nav-base').addEventListener('click', () => {
  if (!basePos) { setNavStatus('База не установлена (нет GPS)', 'err'); return; }
  stopNav('Возврат на базу...');
  // Очищаем старые точки и добавляем базу
  waypoints.forEach(w => map.removeLayer(w.marker));
  waypoints = [];
  addWaypoint(basePos.lat, basePos.lng);
  // Запускаем через короткую паузу
  setTimeout(() => document.getElementById('nav-start').click(), 300);
});

// ОЧИСТИТЬ
document.getElementById('nav-clear').addEventListener('click', () => {
  if (navActive) stopNav();
  waypoints.forEach(w => map.removeLayer(w.marker));
  waypoints = [];
  if (routeLine) { map.removeLayer(routeLine); routeLine = null; }
  renderWPList();
  setNavStatus('Маршрут очищен', '');
});

function setNavStatus(msg, cls) {
  const el = document.getElementById('nav-status');
  el.textContent = msg;
  el.className = cls || '';
}

// Прогресс навигации от ESP
function onNavProgress(d) {
  currentWP = d.wp_index || 0;
  setNavStatus(`Еду к точке ${currentWP+1} из ${waypoints.length} (${d.dist_m || '?'} м)`, 'ok');
  setBadge('b-nav', `→ ${currentWP+1}/${waypoints.length}`, 'ok');
  document.getElementById('b-nav').style.display = '';
  renderWPList();
}

function onNavDone(d) {
  navActive = false;
  document.getElementById('nav-start').disabled = false;
  document.getElementById('nav-stop').disabled  = true;
  document.getElementById('b-nav').style.display = 'none';
  setBadge('b-mode', 'РУЧНОЙ', 'warn');
  setNavStatus('✓ Маршрут выполнен!', 'ok');
  renderWPList();
  drawRoute();
}

// ═══════════════════════════════════════════════════════
// КАМЕРА РОБОТА
// ═══════════════════════════════════════════════════════
let camActive = false;
const camBtn    = document.getElementById('cam-btn');
const camPanel  = document.getElementById('cam-panel');
const camImg    = document.getElementById('cam-img');
const camOffline= document.getElementById('cam-offline');

camBtn.addEventListener('click', () => {
  camActive = !camActive;
  camBtn.classList.toggle('active', camActive);
  camPanel.classList.toggle('open', camActive);
  if (camActive && ws && ws.readyState===1) {
    ws.send(JSON.stringify({type:'cam_subscribe'}));
  } else if (!camActive && ws && ws.readyState===1) {
    ws.send(JSON.stringify({type:'cam_unsubscribe'}));
  }
});

function onCamOnline()  { camOffline.style.display='none'; }
function onCamOffline() { camOffline.style.display=''; camImg.src=''; }
function onCamFrame(b64) {
  if (!camActive) return;
  camImg.src = 'data:image/jpeg;base64,' + b64;
  camOffline.style.display = 'none';
}

// ═══════════════════════════════════════════════════════
// GPS ТЕЛЕФОНА
// ═══════════════════════════════════════════════════════
let phoneGpsActive = false;

function startPhoneGps() {
  if (!navigator.geolocation) return;
  navigator.geolocation.watchPosition(pos => {
    phoneGpsActive = true;
    const lat = pos.coords.latitude;
    const lng = pos.coords.longitude;
    const acc = pos.coords.accuracy.toFixed(0);

    if (!basePos) basePos = {lat, lng};  // Первая координата = база

    document.getElementById('g-lat').textContent = lat.toFixed(5);
    document.getElementById('g-lng').textContent = lng.toFixed(5);
    document.getElementById('g-acc').textContent = acc + ' м';
    const src = document.getElementById('gps-src');
    src.textContent = '📱 Телефон активен';
    src.className   = 'ok';
    setBadge('b-gps', 'GPS ОК', 'ok');
    updateRobotPos(lat, lng);

    if (ws && ws.readyState===1) {
      ws.send(JSON.stringify({
        type: 'phone_gps', lat, lng,
        accuracy: pos.coords.accuracy,
        speed: pos.coords.speed || 0
      }));
      // Если ESP подключён — пересылаем GPS на него (для автопилота)
      if (espId) {
        ws.send(JSON.stringify({
          target: espId, type: 'phone_gps', lat, lng,
          accuracy: pos.coords.accuracy,
          speed: pos.coords.speed || 0
        }));
      }
    }
  }, err => {
    setBadge('b-gps', 'GPS: нет', 'err');
    document.getElementById('gps-src').textContent = 'нет сигнала';
    document.getElementById('gps-src').className = '';
  }, { enableHighAccuracy: true, maximumAge: 1000, timeout: 10000 });
}
startPhoneGps();

// ═══════════════════════════════════════════════════════
// WAKE LOCK
// ═══════════════════════════════════════════════════════
(async function keepAwake() {
  try {
    const wl = await navigator.wakeLock.request('screen');
    wl.addEventListener('release', keepAwake);
  } catch(e) {}
})();
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState==='visible') navigator.wakeLock?.request('screen').catch(()=>{});
});

// ═══════════════════════════════════════════════════════
// WEBSOCKET
// ═══════════════════════════════════════════════════════
let ws=null, espId=null, speed=150;
const pressed = new Set();

function connectWS() {
  const proto = location.protocol==='https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}/ws/browser`);
  ws.onopen  = () => setBadge('b-conn','ОК','ok');
  ws.onclose = () => {
    setBadge('b-conn','нет связи','err');
    espId=null; setBadge('b-esp','ESP: нет','err');
    setTimeout(connectWS, 3000);
  };
  ws.onerror = () => {};
  ws.onmessage = e => {
    try {
      const d = JSON.parse(e.data);
      if      (d.type==='esp_online')    onEspOnline(d);
      else if (d.type==='esp_offline')   onEspOffline(d);
      else if (d.type==='sensors')       onSensors(d);
      else if (d.type==='robot_gps')      onRobotGPS(d);
      else if (d.type==='nav_progress')  onNavProgress(d);
      else if (d.type==='nav_done')      onNavDone(d);
      else if (d.type==='config_ack')    onCfgAck(d);
      else if (d.type==='cam_online')    onCamOnline();
      else if (d.type==='cam_offline')   onCamOffline();
      else if (d.type==='cam_frame')     onCamFrame(d.data);
    } catch(err) {}
  };
}
connectWS();

function sendCmd(cmd) {
  if (!ws || ws.readyState!==1 || !espId) return;
  ws.send(JSON.stringify({target:espId, type:'cmd', cmd, speed}));
}

function onEspOnline(d) {
  espId = d.id;
  setBadge('b-esp','ESP: '+d.id,'ok');
  if (camActive) ws.send(JSON.stringify({type:'cam_subscribe'}));
}
function onEspOffline(d) {
  if (d.id===espId) { espId=null; setBadge('b-esp','ESP: нет','err'); if(navActive) stopNav('ESP отключился!'); }
}

function onSensors(d) {
  const s=d.data||{}, MAX=200;
  [['f','front'],['l','left'],['r','right'],['b','rear']].forEach(([dir,key]) => {
    const v=s[key]??400;
    const pct=Math.min(100,(v/MAX)*100);
    const bar=document.getElementById('b'+dir);
    bar.style.width=pct+'%';
    bar.style.background = v<20?'#f87171':v<50?'#f59e0b':'#4ade80';
    document.getElementById('v'+dir).textContent = v>=400?'—':v;
  });
  const hasObs = ['front','left','right','rear'].some(k => (s[k]??400)<30);
  const obs=document.getElementById('b-obs');
  if (hasObs) { obs.style.display=''; obs.textContent='⚠ препятствие'; obs.className='badge err'; }
  else obs.style.display='none';
}

// ═══════════════════════════════════════════════════════
// D-PAD
// ═══════════════════════════════════════════════════════
document.querySelectorAll('.db[data-cmd]').forEach(btn => {
  const cmd = btn.dataset.cmd;
  const down = e => {
    e.preventDefault();
    if (navActive && cmd!=='stop') return;  // в авторежиме только стоп
    btn.classList.add('on');
    if (cmd==='stop') { pressed.clear(); sendCmd('stop'); if(navActive) stopNav('Ручная остановка'); }
    else { pressed.add(cmd); sendCmd(cmd); }
  };
  const up = e => {
    btn.classList.remove('on');
    if (cmd!=='stop') { pressed.delete(cmd); sendCmd(pressed.size?[...pressed][0]:'stop'); }
  };
  btn.addEventListener('mousedown',  down);
  btn.addEventListener('touchstart', down, {passive:false});
  btn.addEventListener('mouseup',    up);
  btn.addEventListener('touchend',   up);
  btn.addEventListener('mouseleave', up);
  btn.addEventListener('touchcancel',up);
});

const keyMap={ArrowUp:'forward',KeyW:'forward',ArrowDown:'backward',KeyS:'backward',ArrowLeft:'left',KeyA:'left',ArrowRight:'right',KeyD:'right',Space:'stop'};
document.addEventListener('keydown', e => {
  const cmd=keyMap[e.code]; if(!cmd) return; e.preventDefault();
  if(navActive&&cmd!=='stop') return;
  if(cmd==='stop'){pressed.clear();sendCmd('stop');if(navActive)stopNav();}
  else if(!pressed.has(cmd)){pressed.add(cmd);sendCmd(cmd);}
});
document.addEventListener('keyup', e => {
  const cmd=keyMap[e.code]; if(!cmd||cmd==='stop') return;
  pressed.delete(cmd); sendCmd(pressed.size?[...pressed][0]:'stop');
});
window.addEventListener('blur', () => { pressed.clear(); sendCmd('stop'); });

document.getElementById('spd-slider').addEventListener('input', function() {
  speed=parseInt(this.value);
  document.getElementById('spd-val').textContent=speed;
});

// ═══════════════════════════════════════════════════════
// НАСТРОЙКИ ПОРОГОВ
// ═══════════════════════════════════════════════════════
document.getElementById('cfg-btn').addEventListener('click', () => {
  document.getElementById('cfg-panel').classList.toggle('open');
});
document.getElementById('cfg-send').addEventListener('click', () => {
  if (!espId||!ws||ws.readyState!==1) { document.getElementById('cfg-ack').textContent='ESP не подключён!'; return; }
  ws.send(JSON.stringify({
    target: espId, type: 'config',
    front_cm: parseInt(document.getElementById('cfg-f').value),
    side_cm:  parseInt(document.getElementById('cfg-s').value),
    rear_cm:  parseInt(document.getElementById('cfg-r').value)
  }));
  document.getElementById('cfg-ack').textContent='Отправлено...';
  document.getElementById('cfg-ack').className='';
});
function onCfgAck(d) {
  const el=document.getElementById('cfg-ack');
  el.textContent=`ESP принял: перед=${d.front_cm} бок=${d.side_cm} зад=${d.rear_cm} см`;
  el.className='ok';
}

// ═══════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════
function setBadge(id,text,cls) {
  const el=document.getElementById(id);
  el.textContent=text; el.className='badge '+(cls||'');
}
</script>
